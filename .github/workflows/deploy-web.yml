name: Deploy web to GitHub Pages

on:
  push:
    branches:
      - main
      - claude/whatsapp-clone-flutter-jx9ja8
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer pushes cancel in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test

      # base-href must match the project-site path: https://<user>.github.io/OkayMessaging/
      # The Supabase values enable the store-nothing message relay (Realtime
      # broadcast only — no database, no tables). SUPABASE_ANON_KEY is a
      # *publishable* key: it is designed to be shipped in the client bundle,
      # so it is provided here as a build arg rather than a secret.
      - name: Build web
        run: |
          flutter build web --release --base-href "/OkayMessaging/" \
            --dart-define=SUPABASE_URL=https://trbdqucphtsstnrwwfnw.supabase.co \
            --dart-define=SUPABASE_ANON_KEY=sb_publishable_PrY-Aru0AryWyhHgfD2Tow_uXca1owt
            # Re-add `--dart-define=REQUIRE_OTP=true` (with a trailing \ on the
            # line above) once the Supabase Phone provider + SMS is confirmed
            # working, to turn on verified sign-in.

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
