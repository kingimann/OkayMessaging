name: okay_messaging
description: "A WhatsApp-style messaging app built with Flutter. Phone-number login; all chats are stored locally on the device."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  intl: ^0.19.0
  shared_preferences: ^2.2.0
  # Cryptography for the end-to-end message encryption layer:
  #  - crypto: SHA-256 / HMAC (key derivation, fingerprints)
  #  - pointycastle: AES-256-GCM (AEAD) + HKDF + P-256 ECDH key agreement
  crypto: ^3.0.0
  pointycastle: ^4.0.0
  # Used ONLY for Realtime broadcast (ephemeral pub/sub). No database tables,
  # no auth, no stored messages — the relay just passes messages through.
  supabase_flutter: ^2.5.0
  qr_flutter: ^4.1.0
  flutter_webrtc: ^1.5.2
  file_picker: ^11.0.2
  path_provider: ^2.1.6
  # Browser interop (Web Share API + downloads) for saving the encrypted chat
  # backup on the web build. Guarded by a conditional import.
  web: ^1.1.0
  # System share sheet, used only on mobile to send an encrypted chat backup to
  # iCloud Drive / Dropbox / Google Drive / Files (guarded by a conditional
  # import so the web build never references it).
  share_plus: ^10.1.4
  # Native card / Apple Pay / Google Pay sheet for in-chat payments. Used only
  # on mobile (guarded by a conditional import so the web build stays clean).
  flutter_stripe: ^11.1.0
  # Opens the Stripe-hosted Express onboarding (KYC) link in an in-app browser.
  url_launcher: ^6.2.0
  flutter_map: ^8.3.1
  latlong2: ^0.10.1
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.4

# Native launch screen. Regenerate after changing the art with:
#   dart run flutter_native_splash:create
flutter_native_splash:
  color: "#6A3CE0"
  image: assets/icon/splash_logo.png
  android_12:
    color: "#6A3CE0"
    image: assets/icon/splash_logo.png
  android: true
  ios: true
  web: false

# App launcher icons. Regenerate after changing the source art with:
#   dart run flutter_launcher_icons
flutter_launcher_icons:
  image_path: "assets/icon/icon.png"
  android: true
  ios: true
  remove_alpha_ios: true
  min_sdk_android: 23
  adaptive_icon_background: "#6A3CE0"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"
  web:
    generate: true
    background_color: "#6A3CE0"
    theme_color: "#7A5CFF"

flutter:
  uses-material-design: true

  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Medium.ttf
          weight: 500
